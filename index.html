<!DOCTYPE html>
<html>
<head>
  <title>My Letter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e9d5ff, #f3e6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .card {
      width: 80%;
      max-width: 750px;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
    }

    h1 {
      text-align: center;
      color: #7a3db8;
    }

    p {
      line-height: 1.7;
      color: #444;
      white-space: pre-line;
    }

    .bunnies {
      text-align: center;
      font-size: 26px;
      margin-bottom: 10px;
    }

    /* button */
    #startBtn {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      border: none;
      background: #7a3db8;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #letter {
      display: none;
    }

    /* floating bunnies */
    .float {
      position: absolute;
      font-size: 20px;
      animation: floatUp 8s linear infinite;
      opacity: 0.5;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="bunnies">🐰💜🐰</div>

    <h1>Hey Hannah</h1>

    <button id="startBtn" onclick="showLetter()">Open Letter</button>

    <div id="letter"></div>

  </div>

  <script>
    const text = `
I don’t really know how to start this, but I just wanted to let out some things I’ve been carrying in my mind for a while.

I’m not sending this to expect anything or to reopen anything between us. I just want to express myself so I can finally let it go in my mind.

Lately, I’ve been focusing on myself. I got a laptop and started learning things like typing, basic coding, and also exploring psychology and philosophy.

I’ve also been doing some hiking sometimes, just trying to stay active and keep improving little by little.

I’ve been reflecting a lot about myself—how I think, how I process emotions, and how I tend to live too much inside my head.

Madalas I replay things, overthink, and try to understand everything deeply.

I’ve come across ideas that really stuck with me. Like life is a matter of choice, and we are the authors of our own story.

There are also things I never really got to say properly. Not because I want anything back, but because I’ve been carrying them for a long time.

I had regrets, misunderstandings, and moments where I didn’t know how to express myself.

Thank you for being part of my life. I’ve learned a lot, and I genuinely appreciate that.
`;

    function showLetter() {
      document.getElementById("startBtn").style.display = "none";
      const letter = document.getElementById("letter");
      letter.style.display = "block";

      let i = 0;
      let speed = 20;

      function typeWriter() {
        if (i < text.length) {
          letter.innerHTML += text.charAt(i);
          i++;
          setTimeout(typeWriter, speed);
        }
      }

      typeWriter();
    }

    // floating bunnies
    for (let i = 0; i < 15; i++) {
      let bunny = document.createElement("div");
      bunny.classList.add("float");
      bunny.innerHTML = "🐰";
      bunny.style.left = Math.random() * 100 + "vw";
      bunny.style.animationDuration = (5 + Math.random() * 5) + "s";
      document.body.appendChild(bunny);
    }
  </script>

</body>
</html>
